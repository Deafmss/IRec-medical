<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0284c7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <title>iRec - Atendimento Inteligente e Saúde Geral</title>
    <!-- Importing modern typography (Outfit and Inter) from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then((reg) => {
            console.log('[iRec PWA] Service Worker registrado:', reg.scope);
            
            // Força a checagem por nova versão sempre que o app é aberto
            reg.update();

            reg.onupdatefound = () => {
              const installingWorker = reg.installing;
              if (installingWorker) {
                installingWorker.onstatechange = () => {
                  if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    console.log('[iRec PWA] Nova versão detectada! Atualizando app automaticamente...');
                    window.location.reload();
                  }
                };
              }
            };
          }).catch((err) => {
            console.warn('[iRec PWA] Falha ao registrar Service Worker:', err);
          });
        });

        // Checa novas versões quando o usuário volta para o app no celular
        document.addEventListener('visibilitychange', () => {
          if (document.visibilityState === 'visible') {
            navigator.serviceWorker.ready.then(reg => reg.update());
          }
        });
      }
    </script>
  </body>
</html>
